<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WILL SUNG</title>
    <style>
        h1 {
            text-align: center;
            font-size: 36px;
        }
        .sign_up {
            margin: 80px auto;
            width: 450px;
        }
        .sign_up .input_box::after {
            display: block;
            clear: both;
            content: '';
        }
        .sign_up .input_box + .input_box {
            margin-top: 10px;
        }
        .sign_up .input_box input {
            width: 100%;
            height: 36px;
            box-sizing: border-box;
        }
        .sign_up .input_box .btn_box input {
            float: left;
            margin-right: 10px;
            width: calc(70% - 10px);
        }
        .sign_up .input_box .btn_box button {
            float: left;
            display: block;
            width: 30%;
            height: 36px;
            box-sizing: border-box;
        }
        .sign_up .input_box .radio_box {
            float: left;
            width: calc(50% - 5px);
        }
        .sign_up .input_box .radio_box input {
            display: none;
        }
        .sign_up .input_box .radio_box input + label {
            display: block;
            border: 1px solid #000;
            width: 100%;
            height: 36px;
            color: #000;
            line-height: 34px;
            text-align: center;
            cursor: pointer;
        }
        .sign_up .input_box .radio_box input:checked + label {
            background: #000;
            color: #fff;
        }
        .sign_up .input_box .radio_box + .radio_box {
            margin-left: 10px;
        }
        .sign_up .input_box .birth input,
        .sign_up .input_box .phone input {
            float: left;
            margin-right: 5px;
            width: calc(33.333% - 3.333px);
        }
        .sign_up .input_box .birth input:last-child,
        .sign_up .input_box .phone input:last-child {
            margin-right: 0;
        }
        .sign_up .input_box .address > div::after {
            display: block;
            clear: both;
            content: '';
        }
        .sign_up .input_box .address > input {
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div id="wrap">
        <div class="container">
            <div class="sign_up">
                <h1>회원가입</h1>
                <form action="#" method="POST">
                    <div class="input_box">
                        <div class="btn_box">
                            <input type="text" name="" id="" placeholder="아이디">
                            <button type="button">중복확인</button>
                        </div>
                    </div>
                    <div class="input_box">
                        <input type="passowrd" name="" id="" placeholder="패스워드">
                    </div>
                    <div class="input_box">
                        <input type="passowrd" name="" id="" placeholder="패스워드 확인">
                    </div>
                    <div class="input_box">
                        <div class="radio_box">
                            <input type="radio" name="gender" id="male">
                            <label for="male">남자</label>
                        </div>
                        <div class="radio_box">
                            <input type="radio" name="gender" id="female">
                            <label for="female">여자</label>
                        </div>
                    </div>
                    <div class="input_box">
                        <div class="birth">
                            <input type="tel" name="" id="" maxlenth="4" placeholder="YYYY">
                            <input type="tel" name="" id="" maxlenth="2" placeholder="MM">
                            <input type="tel" name="" id="" maxlenth="2" placeholder="DD">
                        </div>
                    </div>
                    <div class="input_box">
                        <div class="phone">
                            <input type="tel" name="" id="" maxlenth="3" placeholder="010">
                            <input type="tel" name="" id="" maxlenth="4" placeholder="1234">
                            <input type="tel" name="" id="" maxlenth="4" placeholder="5678">
                        </div>
                    </div>
                    <div class="input_box">
                        <div class="address">
                            <div class="btn_box">
                                <input type="text" name="" id="zipCode" placeholder="우편번호">
                                <button type="button" onclick="daumPostcodePop()">주소찾기</button>
                            </div>
                            <input type="text" name="" id="addr">
                            <input type="text" name="" id="addrDetail" placeholder="상세주소">
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <!-- 다음 주소찾기 API -->
    <script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
    <script>
        function daumPostcodePop() {
            console.log('sss');
            new daum.Postcode({
                oncomplete: function(data) {
                    // 팝업에서 검색결과 항목을 클릭했을때 실행할 코드를 작성하는 부분.
                    console.log('ddd');

                    // 각 주소의 노출 규칙에 따라 주소를 조합한다.
                    // 내려오는 변수가 값이 없는 경우엔 공백('')값을 가지므로, 이를 참고하여 분기 한다.
                    var addr = ''; // 주소 변수

                    //사용자가 선택한 주소 타입에 따라 해당 주소 값을 가져온다.
                    if (data.userSelectedType === 'R') { // 사용자가 도로명 주소를 선택했을 경우
                        addr = data.roadAddress;
                    } else { // 사용자가 지번 주소를 선택했을 경우(J)
                        addr = data.jibunAddress;
                    }
                    // 우편번호와 주소 정보를 해당 필드에 넣는다.
                    document.getElementById("zipCode").value = data.zonecode;
                    document.getElementById("addr").value = addr;
                    // 커서를 상세주소 필드로 이동한다.
                    document.getElementById("addrDetail").focus();
                }
            }).open();
        }
    </script>
    <!-- // 다음 주소찾기 API -->
</body>
</html>
